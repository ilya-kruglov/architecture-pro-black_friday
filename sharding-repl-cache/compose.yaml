name: sharding-repl-cache

services:
  # Redis Cache
  redis:
    container_name: redis
    image: redis:latest
    ports:
      - 6379:6379
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Config Server (3 реплики)
  configsvr1:
    container_name: configsvr1
    image: mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    volumes:
      - configsvr1_data:/data/db

  configsvr2:
    container_name: configsvr2
    image: mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    volumes:
      - configsvr2_data:/data/db

  configsvr3:
    container_name: configsvr3
    image: mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    volumes:
      - configsvr3_data:/data/db

  # Router (mongos)
  mongos:
    container_name: mongos
    image: mongo:latest
    command: mongos --configdb configReplSet/configsvr1:27019,configsvr2:27019,configsvr3:27019 --bind_ip_all --port 27017
    ports:
      - 27017:27017
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3

  # Shard 1 - Replica Set (3 реплики)
  shard1-1:
    container_name: shard1-1
    image: mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard1_1_data:/data/db

  shard1-2:
    container_name: shard1-2
    image: mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard1_2_data:/data/db

  shard1-3:
    container_name: shard1-3
    image: mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard1_3_data:/data/db

  # Shard 2 - Replica Set (3 реплики)
  shard2-1:
    container_name: shard2-1
    image: mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard2_1_data:/data/db

  shard2-2:
    container_name: shard2-2
    image: mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard2_2_data:/data/db

  shard2-3:
    container_name: shard2-3
    image: mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --bind_ip_all
    volumes:
      - shard2_3_data:/data/db

  # Application with Redis cache
  pymongo_api:
    container_name: pymongo_api
    build: 
      context: ../api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
      - redis
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

volumes:
  redis_data:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1_1_data:
  shard1_2_data:
  shard1_3_data:
  shard2_1_data:
  shard2_2_data:
  shard2_3_data: