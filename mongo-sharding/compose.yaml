name: mongo-sharding

services:
  # Config Server
  configsvr:
    container_name: configsvr
    image: mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    ports:
      - 27020:27019
    volumes:
      - configsvr_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Shard 1
  shard1:
    container_name: shard1
    image: mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    ports:
      - 27018:27018
    volumes:
      - shard1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Shard 2
  shard2:
    container_name: shard2
    image: mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --bind_ip_all
    ports:
      - 27019:27018
    volumes:
      - shard2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Router (mongos) - запускается только после инициализации config и шардов
  mongos:
    container_name: mongos
    image: mongo:latest
    command: mongos --configdb configReplSet/configsvr:27019 --bind_ip_all --port 27017
    ports:
      - 27017:27017
    depends_on:
      configsvr:
        condition: service_healthy
      shard1:
        condition: service_healthy
      shard2:
        condition: service_healthy

  # Application
  pymongo_api:
    container_name: pymongo_api
    build: 
      context: ../api_app
      dockerfile: Dockerfile
    depends_on:
      mongos:
        condition: service_started
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configsvr_data:
  shard1_data:
  shard2_data: